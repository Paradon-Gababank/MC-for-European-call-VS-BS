<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Monte Carlo ATM Call</title>

<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-text-primary: #111;
  --color-text-secondary: #666;
  --color-text-tertiary: #999;
  --color-border-secondary: #ddd;
  --color-border-tertiary: #eee;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}

/* ==== ORIGINAL CSS (ของคุณ) ==== */
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
.metric-value { font-size: 20px; font-weight: 500; margin: 0; color: var(--color-text-primary); }
.metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin: 2px 0 0; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.row > * { flex: 1; min-width: 110px; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.slider-label { font-size: 13px; color: var(--color-text-secondary); width: 95px; flex-shrink: 0; }
.slider-val { font-size: 13px; font-weight: 500; width: 60px; text-align: right; flex-shrink: 0; color: var(--color-text-primary); }
input[type=range] { flex: 1; }
h3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.04em; }
#runBtn { width: 100%; padding: 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; margin-top: 8px; }
#runBtn:hover { background: var(--color-background-secondary); }
.compare-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.compare-table td, .compare-table th { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.compare-table th { font-weight: 500; color: var(--color-text-secondary); text-align: left; font-size: 12px; }
.compare-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.preset-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.preset-btn:hover { background: var(--color-background-secondary); }
.moneyness-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; }
.badge-atm { background: #E1F5EE; color: #085041; }
.badge-itm { background: #E6F1FB; color: #0C447C; }
.badge-otm { background: #FAEEDA; color: #633806; }

body { font-family: sans-serif; margin:0; padding:1rem; background:#fafafa; }
</style>
</head>

<body>

    <button class="preset-btn" onclick="setPreset('highvol')">High volatility</button>
