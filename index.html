<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Monte Carlo ATM Call</title>

<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-text-primary: #111;
  --color-text-secondary: #666;
  --color-text-tertiary: #999;
  --color-border-secondary: #ddd;
  --color-border-tertiary: #eee;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}

body { font-family: sans-serif; margin:0; padding:1rem; background:#fafafa; }

.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
.metric-value { font-size: 20px; font-weight: 500; margin: 0; color: var(--color-text-primary); }
.metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin: 2px 0 0; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.row > * { flex: 1; min-width: 110px; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.slider-label { font-size: 13px; color: var(--color-text-secondary); width: 95px; }
.slider-val { font-size: 13px; font-weight: 500; width: 60px; text-align: right; }
input[type=range] { flex: 1; }
h3 { font-size: 13px; color: var(--color-text-secondary); }
#runBtn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
.compare-table { width:100%; border-collapse: collapse; font-size:13px;}
.compare-table td, .compare-table th { padding:6px; border-bottom:1px solid #eee;}
</style>
</head>

<body>

<h2>Monte Carlo ATM Call</h2>

<div class="card">

<div class="slider-row">
  <span class="slider-label">S₀</span>
  <input type="range" id="s0" min="50" max="200" value="100">
  <span class="slider-val" id="s0v">100</span>
</div>

<div class="slider-row">
  <span class="slider-label">K</span>
  <input type="range" id="k" min="50" max="200" value="100">
  <span class="slider-val" id="kv">100</span>
</div>

<div class="slider-row">
  <span class="slider-label">σ</span>
  <input type="range" id="sig" min="0.05" max="0.8" step="0.01" value="0.2">
  <span class="slider-val" id="sigv">0.2</span>
</div>

<button id="runBtn">Run Monte Carlo</button>

</div>

<div class="row">
  <div class="metric">
    <p class="metric-label">Monte Carlo Price</p>
    <p class="metric-value" id="mcPrice">—</p>
  </div>
</div>

<div class="card">
  <h3>Histogram</h3>
  <canvas id="histChart"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
function boxMuller() {
  let u=0,v=0;
  while(!u) u=Math.random();
  while(!v) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function monteCarlo(S,K,sig,N=10000){
  let sum=0;
  let payoffs=[];
  for(let i=0;i<N;i++){
    const z=boxMuller();
    const ST=S*Math.exp(sig*z);
    const p=Math.max(ST-K,0);
    payoffs.push(p);
    sum+=p;
  }
  return {price:sum/N, payoffs};
}

let chart;

function run(){
  const S=parseFloat(s0.value);
  const K=parseFloat(k.value);
  const sig=parseFloat(sig.value);

  const mc=monteCarlo(S,K,sig);
  mcPrice.textContent=mc.price.toFixed(4);

  const bins=30;
  const max=Math.max(...mc.payoffs);
  const size=max/bins;
  let counts=new Array(bins).fill(0);

  mc.payoffs.forEach(p=>{
    const i=Math.min(Math.floor(p/size),bins-1);
    counts[i]++;
  });

  if(chart) chart.destroy();
  chart=new Chart(histChart,{
    type:'bar',
    data:{
      labels:counts.map((_,i)=>(i*size).toFixed(1)),
      datasets:[{data:counts}]
    }
  });
}

runBtn.onclick=run;

s0.oninput=()=>s0v.textContent=s0.value;
k.oninput=()=>kv.textContent=k.value;
sig.oninput=()=>sigv.textContent=sig.value;
</script>

</body>
</html>
